name: discord-thread-discovery daily digest

on:
  schedule:
    # GitHub Actions の cron は UTC 基準。JST時刻から9時間引いた値を設定する。
    # JST 06:00 → UTC 21:00 (前日) → "0 21 * * *"
    # JST 07:00 → UTC 22:00 (前日) → "0 22 * * *"
    # JST 08:00 → UTC 23:00 (前日) → "0 23 * * *"  ← デフォルト
    # JST 09:00 → UTC 00:00 (当日) → "0 0 * * *"
    # JST 10:00 → UTC 01:00 (当日) → "0 1 * * *"
    # JST 12:00 → UTC 03:00 (当日) → "0 3 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch: {} # 手動実行（テスト用）

jobs:
  dig:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Run digest
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          HOBBY_CHANNEL_ID: ${{ secrets.HOBBY_CHANNEL_ID }}
          DIGEST_WEBHOOK_URL: ${{ secrets.DIGEST_WEBHOOK_URL }}
        run: bundle exec ruby dig.rb
